<!DOCTYPE html>
<html>
<body>

<h2>Contact Form</h2>

<form action="/action_page.php">
  <label for="fname">First name:</label><br>
  <input type="text" id="fname" name="fname" value="Dharini"><br>
  
  <label for="lname">Last name:</label><br>
  <input type="text" id="lname" name="lname" value="Doe"><br><br>

  <label for="email">Email Address:</label><br>
  <input type="email" id="email" name="email" placeholder="email@example.com" required><br><br>

  <label for="category">Select Category:</label><br>
  <select id="category" name="category">
    <option value="general">General Inquiry</option>
    <option value="support">Technical Support</option>
    <option value="feedback">Feedback</option>
    <option value="other">Other</option>
  </select><br><br>

  <label for="message">Message:</label><br>
  <textarea id="message" name="message" rows="5" cols="30" placeholder="Type your message here..."></textarea><br><br>

  <input type="submit" value="Submit">
</form> 

<p>If you click the "Submit" button, the form-data will be sent to "/action_page.php".</p>

</body>
</html>
