
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial,sans-serif;

    background:linear-gradient(
        to right,
        #1e293b,
        #334155
    );

    overflow:hidden;
}

.container{

    width:90%;
    max-width:450px;

    padding:45px;

    border-radius:25px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,0.1);

    text-align:center;

    color:white;

    box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

h1{
    font-size:42px;
    margin-bottom:12px;
}

#status{

    color:#cbd5e1;

    margin-bottom:25px;

    font-size:20px;
}

input{

    width:100%;

    padding:16px;

    border:none;

    outline:none;

    border-radius:12px;

    font-size:18px;

    margin-bottom:22px;

    background:rgba(255,255,255,0.08);

    color:white;
}

input::placeholder{
    color:#94a3b8;
}

button{

    width:100%;

    padding:16px;

    border:none;

    border-radius:12px;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    background:#0f172a;

    color:#f8fafc;

    transition:0.3s;
}

button:hover{
    background:#2563eb;
}

#attempts{

    margin-top:20px;

    font-size:18px;

    color:#e2e8f0;
}

#homepage{

    display:inline-block;

    margin-top:22px;

    padding:12px 22px;

    border-radius:12px;

    text-decoration:none;

    background:#7c3aed;

    color:white;

    transition:0.3s;
}

#homepage:hover{
    background:#9333ea;
}

</style>

</head>

<body>

<div class="container">

    <h1>Secure Login</h1>

    <h3 id="status">
        Enter Password
    </h3>

    <input
    type="password"
    id="password"
    placeholder="Enter Password">

    <button id="loginBtn">
        Login
    </button>

    <p id="attempts">
        Attempts Left : 3
    </p>

    <a
    id="homepage"
    href="https://dhariniks496.github.io/dharini.github.io-sem4-fet/index.html">

        Home Page

    </a>

</div>

<script src = "12.js"></script>

</body>

</html>
