
  <!DOCTYPE html>
<html>
<head>
    <title>Z-Index Layer Toggle</title>

    <style>

        body{
            background: linear-gradient(
                to right,
                rgb(50,180,190),
                rgb(160,160,160)
            );
            margin: 0;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container */
        .container {
            font-family: Arial, sans-serif;
            padding: 20px;
            background:   linear-gradient(to right,rgb(50,180,190),rgb(160,160,160));;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        h3{
            text-align: center;
        }

        /* Content box */
        .content-box {
            position: relative;
            width: 300px;
            height: 150px;
            margin-top: 15px;
            border: 2px solid #333;
            overflow: hidden;
        }

        /* Layers */
        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;

            color: black;
            font-size: 22px;
            font-weight: bold;

            align-items: center;
            justify-content: center;
        }

        /* Layer backgrounds using gradients */

        #layer1 {
            background: linear-gradient(
                45deg,
                rgb(255,99,71),
                rgb(255,160,122)
            );
        }

        #layer2 {
            background: linear-gradient(
                45deg,
                rgb(30,144,255),
                rgb(135,206,250)
            );
        }

        #layer3 {
            background: linear-gradient(
                45deg,
                rgb(60,179,113),
                rgb(144,238,144)
            );
        }

        /* Active layer */
        .active {
            display: flex !important;
            z-index: 5;
        }

        /* Buttons */
        button{
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            background: rgb(0,0,0);
            color: white;
            transition: 0.3s;
        }

        button:hover{
            background: rgb(30,150,160);
            transform: scale(1.05);
        }

    </style>
</head>

<body>

    <div class="container">

        <h3>Simple Layer Switcher</h3>

        <button onclick="show('layer1')">Show Red</button>
        <button onclick="show('layer2')">Show Blue</button>
        <button onclick="show('layer3')">Show Green</button>

        <div class="content-box">

            <div id="layer1" class="layer active">
                LAYER 1 (Red)
            </div>

            <div id="layer2" class="layer">
                LAYER 2 (Blue)
            </div>

            <div id="layer3" class="layer">
                LAYER 3 (Green)
            </div>

        </div>
    </div>

    <script>

        function show(id) {

            // Remove active class from all layers
            let layers = document.getElementsByClassName('layer');

            for(let i = 0; i < layers.length; i++) {
                layers[i].classList.remove('active');
            }

            // Show selected layer
            document.getElementById(id).classList.add('active');
        }

    </script>

</body>
</html>
