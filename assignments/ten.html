
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Simple Layer Switcher</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        h1{
            font-size: 28px;
        }

        button{
            padding: 8px 15px;
            margin-right: 5px;
            font-size: 18px;
        }

        .container{
            position: relative;
            width: 400px;
            height: 200px;
            margin-top: 20px;
        }

        .layer{
            position: absolute;
            width: 360px;
            height: 180px;
            border: 2px solid black;
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            line-height: 180px;
            top: 0;
            left: 0;
        }

        #red{
            background-color: tomato;
            z-index: 3;
        }

        #blue{
            background-color: royalblue;
            z-index: 2;
        }

        #green{
            background-color: seagreen;
            z-index: 1;
        }
    </style>
</head>
<body>

    <h1>Simple Layer Switcher</h1>

    <button onclick="showLayer('red')">Show Red</button>
    <button onclick="showLayer('blue')">Show Blue</button>
    <button onclick="showLayer('green')">Show Green</button>

    <div class="container">
        <div id="red" class="layer">LAYER 1 (Red)</div>
        <div id="blue" class="layer">LAYER 2 (Blue)</div>
        <div id="green" class="layer">LAYER 3 (Green)</div>
    </div>

    <script>
        function showLayer(color){
            document.getElementById("red").style.zIndex = 1;
            document.getElementById("blue").style.zIndex = 1;
            document.getElementById("green").style.zIndex = 1;

            document.getElementById(color).style.zIndex = 10;
        }
    </script>

</body>
</html>
